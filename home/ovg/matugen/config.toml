[config]
reload_apps = false
set_wallpaper = false

[config.templates.ghostty-colors]
input_path  = "~/.config/matugen/templates/ghostty-colors.conf"
output_path = "~/.cache/matugen/ghostty-colors.conf"

[config.templates.mako]
input_path  = "~/.config/matugen/templates/mako.conf"
output_path = "~/.config/mako/config"

[config.templates.wofi-colors]
input_path  = "~/.config/matugen/templates/wofi-colors.css"
output_path = "~/.config/wofi/style.css"

[config.templates.niri-colors]
input_path  = "~/.config/matugen/templates/niri-colors.kdl"
output_path = "~/.cache/matugen/niri-colors.kdl"

[config.templates.qs-colors]
input_path  = "~/.config/matugen/templates/qs-colors.json"
output_path = "~/.cache/matugen/qs-colors.json"
