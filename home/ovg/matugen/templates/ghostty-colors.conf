background = {{colors.background.default.hex}}
foreground = {{colors.on_surface.default.hex}}
# M3-correct selection: secondary_container bg (tone ~30) + on_secondary_container fg (tone ~90)
selection-background = {{colors.secondary_container.default.hex}}
selection-foreground = {{colors.on_secondary_container.default.hex}}
cursor-color = {{colors.primary.default.hex}}
cursor-text = {{colors.on_primary.default.hex}}

# ANSI 16-colour palette — Material Design 3, symphony community structure.
#
# Normal hues (1-7): tone 80 (on_* roles in dark scheme).
# Bright hues (9-12): *_container roles (tone ~30) — M3 accent fills.
# Magenta/Cyan use *_fixed* tokens (tone 90/80) — stable across light/dark.
# Brights 13-14 use the *_fixed (tone 90) variant for distinct bright pair.
#
# M3 has 4 accent palettes; magenta shares tertiary, cyan shares secondary.

# 0  Black          surface_container_high, tone ~17 — distinct from bg tone ~6
palette = 0={{colors.surface_container_high.default.hex}}
# 1  Red            error, tone 80
palette = 1={{colors.error.default.hex}}
# 2  Green          tertiary, tone 80
palette = 2={{colors.tertiary.default.hex}}
# 3  Yellow         secondary, tone 80
palette = 3={{colors.secondary.default.hex}}
# 4  Blue           primary, tone 80
palette = 4={{colors.primary.default.hex}}
# 5  Magenta        tertiary_fixed_dim, tone 80 — stable across schemes
palette = 5={{colors.tertiary_fixed_dim.default.hex}}
# 6  Cyan           secondary_fixed_dim, tone 80 — stable across schemes
palette = 6={{colors.secondary_fixed_dim.default.hex}}
# 7  White          on_surface_variant, tone 80 — muted foreground
palette = 7={{colors.on_surface_variant.default.hex}}
# 8  Bright Black   surface_bright, tone ~24 — visible dark gray
palette = 8={{colors.surface_bright.default.hex}}
# 9  Bright Red     error_container, tone ~30 — accent fill
palette = 9={{colors.error_container.default.hex}}
# 10 Bright Green   tertiary_container, tone ~30 — accent fill
palette = 10={{colors.tertiary_container.default.hex}}
# 11 Bright Yellow  secondary_container, tone ~30 — accent fill
palette = 11={{colors.secondary_container.default.hex}}
# 12 Bright Blue    primary_container, tone ~30 — accent fill
palette = 12={{colors.primary_container.default.hex}}
# 13 Bright Magenta tertiary_fixed, tone 90 — brighter than slot 5 (dim)
palette = 13={{colors.tertiary_fixed.default.hex}}
# 14 Bright Cyan    secondary_fixed, tone 90 — brighter than slot 6 (dim)
palette = 14={{colors.secondary_fixed.default.hex}}
# 15 Bright White   on_surface, tone 90 — primary foreground
palette = 15={{colors.on_surface.default.hex}}
