background = {{colors.background.default.hex}}
foreground = {{colors.on_background.default.hex}}
# M3-correct selection: secondary_container bg (tone ~30) + on_secondary_container fg (tone ~90)
selection-background = {{colors.secondary_container.default.hex}}
selection-foreground = {{colors.on_secondary_container.default.hex}}
cursor-color = {{colors.primary.default.hex}}
cursor-text = {{colors.on_primary.default.hex}}

# ANSI 16-colour palette — Material Design 3 dark-scheme tonal mapping.
#
# Principle: every text slot uses tone 80 (normal) or tone 90 (bright).
# Tone <60 on a tone-6 background fails WCAG AA; all *_container and on_*
# roles in dark mode are at tone 20-30 and are therefore excluded.
#
# M3 has 4 accent palettes (primary, secondary, tertiary, error) but ANSI
# needs 6 hues, so magenta shares tertiary and cyan shares secondary.
# Unavoidable consequence: tertiary_fixed == on_tertiary_container (both
# tone 90 of the same palette), so slots 5, 10, 13 share one hex value and
# slots 6, 11, 14 share another. All other slots are distinct.

# 0  Black          near-black surface, tone ~4
palette = 0={{colors.surface_container_lowest.default.hex}}
# 1  Red            error palette, tone 80
palette = 1={{colors.error.default.hex}}
# 2  Green          tertiary, tone 80
palette = 2={{colors.tertiary.default.hex}}
# 3  Yellow         secondary, tone 80
palette = 3={{colors.secondary.default.hex}}
# 4  Blue           primary, tone 80
palette = 4={{colors.primary.default.hex}}
# 5  Magenta        tertiary_fixed, tone 90 — same hue as 2, brighter (+10)
palette = 5={{colors.tertiary_fixed.default.hex}}
# 6  Cyan           secondary_fixed, tone 90 — same hue as 3, brighter (+10)
palette = 6={{colors.secondary_fixed.default.hex}}
# 7  White          on_surface_variant, tone 80 — muted foreground
palette = 7={{colors.on_surface_variant.default.hex}}
# 8  Bright Black   surface_container_highest, tone ~22 — visible dark gray
palette = 8={{colors.surface_container_highest.default.hex}}
# 9  Bright Red     on_error_container, tone 90
palette = 9={{colors.on_error_container.default.hex}}
# 10 Bright Green   on_tertiary_container, tone 90
palette = 10={{colors.on_tertiary_container.default.hex}}
# 11 Bright Yellow  on_secondary_container, tone 90
palette = 11={{colors.on_secondary_container.default.hex}}
# 12 Bright Blue    on_primary_container, tone 90
palette = 12={{colors.on_primary_container.default.hex}}
# 13 Bright Magenta on_tertiary_container, tone 90 (= slot 10; tertiary pair)
palette = 13={{colors.on_tertiary_container.default.hex}}
# 14 Bright Cyan    on_secondary_container, tone 90 (= slot 11; secondary pair)
palette = 14={{colors.on_secondary_container.default.hex}}
# 15 Bright White   on_background, tone 90 — primary foreground
palette = 15={{colors.on_background.default.hex}}
