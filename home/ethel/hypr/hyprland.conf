# Hyprland configuration — full parity with niri config.
# Uses the built-in scrolling layout (hyprscrolling).
# Color theming sourced from matugen via hyprland-colors.conf.

# ── Monitor ─────────────────────────────────────────────────────────────────
monitor = eDP-1, 1920x1080@60, 0x0, 1.25
monitor = , preferred, auto, 1

# ── Colors ──────────────────────────────────────────────────────────────────
# Live colors from matugen — overrides static fallbacks below.
# File is generated by update-colors; seeded on fresh install by matugen activation.
source = ~/.cache/matugen/hyprland-colors.conf

# ── General ─────────────────────────────────────────────────────────────────
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 1
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = scrolling
    no_focus_fallback = true
}

# ── Scrolling Layout ───────────────────────────────────────────────────────
plugin {
    scrolling {
        column_widths = 0.3 0.5 0.6 1.0
        default_column_width = 0.6
        center_focused = on-overflow
    }
}

# ── Decoration ──────────────────────────────────────────────────────────────
decoration {
    rounding = 12

    shadow {
        enabled = true
        range = 30
        offset = 0, 5
        color = $shadow_color
    }

    blur {
        enabled = false
    }
}

# ── Animations ──────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 3, ease, slide
    animation = windowsOut, 1, 3, ease, slide
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 3, ease, slide
}

# ── Input ───────────────────────────────────────────────────────────────────
input {
    kb_layout = us,ru
    kb_options = grp:win_space_toggle
    numlock_by_default = true
    follow_mouse = 0

    touchpad {
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.2
    }
}

# Trackpoint
device {
    name = tpps/2-elan-trackpoint
    sensitivity = 0.5
    accel_profile = adaptive
}

# Hide cursor after 3 seconds of inactivity.
cursor {
    inactive_timeout = 3
}

# ── Misc ────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    # Equivalent to niri's prefer-no-csd.
    no_direct_scanout = false
}

xwayland {
    force_zero_scaling = true
}

# ── Autostart ───────────────────────────────────────────────────────────────
exec-once = swww-daemon
exec-once = mako
exec-once = quickshell
exec-once = hypridle
exec-once = xwayland-satellite

# ── Window Rules ────────────────────────────────────────────────────────────

# XDG portal file pickers as floating.
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(xdg-desktop-portal-gnome)$
windowrulev2 = float, class:^(xdg-desktop-portal-hyprland)$

# NixOS rebuild terminal — floating, top-center.
windowrulev2 = float, class:^(org\.nixos\.rebuild)$
windowrulev2 = size 60% 20%, class:^(org\.nixos\.rebuild)$
windowrulev2 = move 20% 6, class:^(org\.nixos\.rebuild)$

# OpenCode — narrower column.
windowrulev2 = scrollingwidth 0.4, class:^(dev\.opencode\.opencode)$

# Apple Music web app.
windowrulev2 = scrollingwidth 0.3, class:^(chrome-music\.apple\.com__-Default)$

# YouTube web app.
windowrulev2 = scrollingwidth 1.0, class:^(chrome-www\.youtube\.com__-Default)$

# qutebrowser.
windowrulev2 = scrollingwidth 0.7, class:^(org\.qutebrowser\.qutebrowser)$

# ── Keybindings ─────────────────────────────────────────────────────────────
# Mod = SUPER. Full parity with niri binds.kdl.

# ── Programs ────────────────────────────────────────────────────────────────
bind = SUPER, Return, exec, ghostty
bind = SUPER SHIFT, Return, exec, ghostty --quick-terminal
bind = SUPER ALT, L, exec, hyprlock
bind = SUPER, space, exec, wofi --show drun
bind = SUPER, N, exec, ghostty -e nvim -c "lua require('org-roam').api.find_node()"
bind = SUPER, O, exec, ghostty -e nvim -c "lua local roam = require('org-roam'); roam.database:load():next(function() for _, id in ipairs(roam.database:ids()) do local node = roam.database:get_sync(id); if node and node.title == 'home' then vim.cmd.edit(node.file); break; end; end; end)"
bind = SUPER CTRL, N, exec, wifi-menu
bind = SUPER CTRL, B, exec, bluetooth-menu
bind = SUPER CTRL, S, exec, audio-menu
bind = SUPER CTRL, T, exec, toggle-touchpad
bind = SUPER CTRL, G, exec, toggle-visualizer
bind = SUPER, B, exec, qutebrowser

# NixOS maintenance.
bind = SUPER SHIFT, R, exec, ghostty --class=org.nixos.rebuild -e nixos-rebuild-dotfiles
bind = SUPER SHIFT, U, exec, ghostty --class=org.nixos.rebuild -e update-nixos
bind = SUPER CTRL SHIFT, C, exec, ghostty --class=dev.opencode.opencode -e opencode-dotfiles

# Screen reader toggle.
bind = SUPER ALT, S, exec, pkill orca || exec orca

# ── Volume / Media (work when locked) ──────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+ -l 1.0
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

# ── Brightness ──────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp, exec, brightnessctl --class=backlight set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl --class=backlight set 10%-

# ── ThinkPad Fn keys ───────────────────────────────────────────────────────
bind = , XF86WLAN, exec, nmcli radio wifi | grep -q enabled && nmcli radio wifi off || nmcli radio wifi on
bind = , XF86Bluetooth, exec, bluetoothctl show | grep -q 'Powered: yes' && bluetoothctl power off || bluetoothctl power on
bind = , XF86Display, focusmonitor, +1
bind = , XF86Keyboard, exec, ghostty -e nvim ~/dotfiles/nix-config/home/ethel/kanata.kbd
bind = , XF86Messenger, exec, ghostty
bind = , XF86Favorites, exec, wofi --show drun

# ── Overview ────────────────────────────────────────────────────────────────
bind = SUPER SHIFT, O, hyprexpo:expo, toggle

# ── Window Management ──────────────────────────────────────────────────────
bind = SUPER, Q, killactive

# Focus navigation (scrolling layout: left/right = columns, up/down = workspaces).
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u

# Move windows.
bind = SUPER CTRL, H, movewindow, l
bind = SUPER CTRL, L, movewindow, r
bind = SUPER CTRL, J, movewindow, d
bind = SUPER CTRL, K, movewindow, u

# Focus first/last column.
bind = SUPER, Home, movefocus, l, 999
bind = SUPER, End, movefocus, r, 999
bind = SUPER CTRL, Home, movewindow, l, 999
bind = SUPER CTRL, End, movewindow, r, 999

# Monitor focus.
bind = SUPER SHIFT, H, focusmonitor, l
bind = SUPER SHIFT, J, focusmonitor, d
bind = SUPER SHIFT, K, focusmonitor, u
bind = SUPER SHIFT, L, focusmonitor, r

# Move column to monitor.
bind = SUPER CTRL SHIFT, H, movewindow, mon:l
bind = SUPER CTRL SHIFT, J, movewindow, mon:d
bind = SUPER CTRL SHIFT, K, movewindow, mon:u
bind = SUPER CTRL SHIFT, L, movewindow, mon:r

# Workspace navigation.
bind = SUPER, Page_Down, workspace, +1
bind = SUPER, Page_Up, workspace, -1
bind = SUPER, U, workspace, +1
bind = SUPER, I, workspace, -1
bind = SUPER CTRL, Page_Down, movetoworkspace, +1
bind = SUPER CTRL, Page_Up, movetoworkspace, -1
bind = SUPER CTRL, U, movetoworkspace, +1
bind = SUPER CTRL, I, movetoworkspace, -1

# Cycle column width presets (scrolling layout).
bind = SUPER, R, scrolling:cycle_column_width

# Maximize column (fill screen width).
bind = SUPER, F, fullscreen, 1

# File manager.
bind = SUPER, E, exec, ghostty -e ranger

# Apple Music.
bind = SUPER, M, exec, apple-music

# Expand column to available width.
bind = SUPER CTRL, F, scrolling:fit_width

# Center focused column.
bind = SUPER, C, centerwindow

# Width adjustments.
binde = SUPER, minus, resizeactive, -10% 0
binde = SUPER, equal, resizeactive, 10% 0

# Height adjustments.
binde = SUPER SHIFT, minus, resizeactive, 0 -10%
binde = SUPER SHIFT, equal, resizeactive, 0 10%

# Float toggle.
bind = SUPER, V, togglefloating
bind = SUPER SHIFT, V, cyclenext, floating

# Tabbed (grouped) display.
bind = SUPER, W, togglegroup

# Wallpaper picker.
bind = SUPER SHIFT, W, exec, toggle-wallpaper-picker

# Screenshots.
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = CTRL, Print, exec, grim - | wl-copy
bind = ALT, Print, exec, hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | xargs -I{} grim -g "{}" - | wl-copy

# Keyboard shortcuts inhibitor toggle.
bind = SUPER, Escape, submap, passthrough
submap = passthrough
bind = SUPER, Escape, submap, reset
submap = reset

# Session management.
bind = SUPER SHIFT, E, exit
bind = SUPER CTRL SHIFT, R, exec, systemctl reboot

# Power off monitors.
bind = SUPER SHIFT, P, dpms, off

# Power menu.
bind = SUPER, P, exec, power-menu
