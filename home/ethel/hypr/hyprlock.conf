# Hyprlock configuration — parity with swaylock-effects appearance.
# Colors are sourced from matugen via hyprlock-colors.conf.

source = ~/.cache/matugen/hyprlock-colors.conf

background {
    monitor =
    path = ~/.config/wallpaper.jpg
    blur_passes = 2
    blur_size = 5
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 4
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = $ring_color
    inner_color = $inside_color
    font_color = $text_color
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = -1
    check_color = $ring_color
    fail_color = $fail_color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $text_color
    font_size = 48
    font_family = FiraMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
